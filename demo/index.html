<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css" />
</head>
</head>
<body>
  <div class="wrapper">
    <h1>Celerio</h1>
    <p>Drag, use keyboard arrows (&larr; & &rarr;) or click to rotate image.</p>
    <div id="carbody"></div>
    <div id="viewer" style="width: 100vw; height: 100vh;"></div>
    <div class="buttons-wrapper">
      <button class="button" id="prev">Prev</button>
      spin
      <button class="button" id="next">Next</button>
      <button class="optionbutton" id="interior-btn">Interior</button>
      <button class="optionbutton" id="exterior-btn">Exterior</button>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@mladenilic/threesixty.js/dist/threesixty.js"></script>
    <script src="index.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
            "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.module.js",
            "@photo-sphere-viewer/cubemap-adapter":"https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/cubemap-adapter@5.14.1/index.module.min.js"
        }
    }
    </script>
    <script type="module">
      import { Viewer } from '@photo-sphere-viewer/core';
      import {  CubemapAdapter } from '@photo-sphere-viewer/cubemap-adapter';

      const viewer = new Viewer({
        container: document.querySelector('#viewer'),
        adapter: CubemapAdapter,
        panorama: {
          type:'net',
          left: '../images/Celerio/right.jpg',
          front: '../images/Celerio/front.jpg',
          right: '../images/Celerio/left.jpg',
          back: '../images/Celerio/back.jpg',
          top: '../images/Celerio/up.jpg',
          bottom: '../images/Celerio/down.jpg',
          flipTopBottom: true,
      },
      size: { // explicitly set size
        width: 875,
        height: 525
    }
      });
    </script>
  </div>
</body>
</html>
